name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            curl \
            wget \
            file \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - run: bun install
      - run: bun run tauri build

      - name: Upload windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/listenmoe.exe

      - name: Upload linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: src-tauri/target/release/listenmoe

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle/macos/listen.moe.app
